<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Michel Velkov</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #000;
      color: #fff;
      font-family: "DejaVu Sans", sans-serif;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 760px;
    }
    img {
      margin-top: 18px;
      width: min(320px, 80vw);
      border-radius: 14px;
      border: 2px solid #fff;
      box-shadow: 0 0 24px rgba(255, 255, 255, 0.22);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Michel Velkov</h1>
    <p>Pozdravljeni. To je moja preprosta spletna stran na Apache2 strezniku.</p>
    <img src="michel.jpg" alt="Fotografija Michel Velkov">
  </main>
</body>
</html>
